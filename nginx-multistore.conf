# /etc/nginx/sites-available/luxtronics-multistore
# Three virtual hosts, same React build

server {
    server_name luxtronics.in www.luxtronics.in;
    root /var/www/luxtronics.in;
    index index.html;
    
    location / {
        try_files $uri /index.html;
    }
    
    # Optional: Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    server_name luxtronics.com.au www.luxtronics.com.au;
    root /var/www/luxtronics.com.au;
    index index.html;
    
    location / {
        try_files $uri /index.html;
    }
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    server_name luxtronics.co.nz www.luxtronics.co.nz;
    root /var/www/luxtronics.co.nz;
    index index.html;
    
    location / {
        try_files $uri /index.html;
    }
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
